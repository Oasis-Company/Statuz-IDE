<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/svg+xml" href="assets/logo.svg">
  <link rel="stylesheet" href="css/style.css">
  <title>404 — Statuz IDE</title>
  <style>
    .error-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    .error-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }
    .error-code {
      font-size: 8rem;
      font-weight: 900;
      line-height: 1;
      letter-spacing: -0.04em;
    }
  </style>
</head>
<body>
  <div class="error-page">
    <div class="container">
      <div class="error-content">
        <svg width="64" height="64" viewBox="0 0 256 256" fill="none" aria-hidden="true">
          <line x1="40" y1="184" x2="144" y2="168" stroke="currentColor" stroke-width="16" stroke-linecap="round"/>
          <line x1="144" y1="168" x2="112" y2="72" stroke="currentColor" stroke-width="16" stroke-linecap="round"/>
          <line x1="112" y1="72" x2="216" y2="56" stroke="currentColor" stroke-width="16" stroke-linecap="round"/>
          <circle cx="128" cy="120" r="20" fill="currentColor"/>
        </svg>
        <div class="error-code">404</div>
        <p class="body-large" style="max-width:400px;">The page you're looking for does not exist in this graph.</p>
        <a href="index.html" class="btn btn-primary">Back to Home</a>
      </div>
    </div>
  </div>
</body>
</html>
