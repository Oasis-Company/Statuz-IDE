<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script>
(function() {
  var tl = gsap.timeline({ paused: true });

  /* ---- Create line 1 characters ---- */
  var line1Text = "The text era is over.";
  var line1Container = document.getElementById('line1Text');
  var chars = [];
  for (var i = 0; i < line1Text.length; i++) {
    var span = document.createElement('span');
    span.className = 'line1-char';
    span.textContent = line1Text.charAt(i) === ' ' ? '\u00A0' : line1Text.charAt(i);
    line1Container.appendChild(span);
    chars.push(span);
  }

  /* ---- Create particles (deterministic) ---- */
  var particlesData = [
    { x: 200, y: 800, size: 2 },
    { x: 450, y: 700, size: 3 },
    { x: 700, y: 900, size: 2 },
    { x: 950, y: 600, size: 4 },
    { x: 1200, y: 850, size: 2 },
    { x: 1450, y: 750, size: 3 },
    { x: 1700, y: 800, size: 2 },
    { x: 300, y: 500, size: 3 },
    { x: 600, y: 400, size: 2 },
    { x: 900, y: 300, size: 4 },
    { x: 1100, y: 500, size: 2 },
    { x: 1400, y: 400, size: 3 },
    { x: 1600, y: 600, size: 2 },
    { x: 500, y: 200, size: 3 },
    { x: 1300, y: 200, size: 2 }
  ];

  var particlesContainer = document.getElementById('particlesContainer');
  var particleEls = [];
  for (var p = 0; p < particlesData.length; p++) {
    var pd = particlesData[p];
    var el = document.createElement('div');
    el.className = 'particle';
    el.style.width = pd.size + 'px';
    el.style.height = pd.size + 'px';
    el.style.left = pd.x + 'px';
    el.style.top = pd.y + 'px';
    el.style.opacity = 0.08 + (pd.size - 2) * 0.04;
    particlesContainer.appendChild(el);
    particleEls.push({ el: el, idx: p });
  }

  /* ---- Set initial states ---- */
  gsap.set(chars, { autoAlpha: 0, y: 10 });
  gsap.set('#line2Container', { autoAlpha: 0, y: 40 });
  gsap.set('#bottomRule', { scaleX: 0, transformOrigin: 'center center' });
  gsap.set('#statuzLogo', { autoAlpha: 0, scale: 1 });
  gsap.set('#oasisCompany', { autoAlpha: 0 });

  /* ---- Timeline animations ---- */
  // Line 1 type-on (0s)
  tl.to(chars, { autoAlpha: 1, y: 0, duration: 0.2, stagger: 0.035, ease: 'power2.out' }, 0);

  // Oasis Company (1.0s)
  tl.to('#oasisCompany', { autoAlpha: 1, duration: 0.3, ease: 'power2.out' }, 1.0);

  // Line 2 slam-in from below (2.0s)
  tl.to('#line2Container', { autoAlpha: 1, y: 0, duration: 0.5, ease: 'power3.out' }, 2.0);

  // "topology" highlight - text color change + glow (2.8s)
  tl.to('#topologyWord', { color: '#007FD4', textShadow: '0 0 20px rgba(0,127,212,0.4)', duration: 0.4, ease: 'power2.out' }, 2.8);

  // Bottom rule draws from center (3.2s)
  tl.fromTo('#bottomRule', { scaleX: 0 }, { scaleX: 1, duration: 0.5, ease: 'power2.out', transformOrigin: 'center center' }, 3.2);

  // Statuz logo fades in (1.5s)
  tl.to('#statuzLogo', { autoAlpha: 1, duration: 0.3, ease: 'power2.out' }, 1.5);

  // Ghost text drift left
  tl.to('#ghostText', { x: -30, duration: 4, ease: 'none' }, 0);

  /* ---- Ambient glow breathing (looping, outside timeline) ---- */
  gsap.to('#ambientGlow', {
    opacity: 0.12,
    duration: 2,
    ease: 'sine.inOut',
    yoyo: true,
    repeat: 10
  });

  /* ---- Particle float animations (deterministic drift) ---- */
  for (var q = 0; q < particleEls.length; q++) {
    var pe = particleEls[q];
    var driftY = -(20 + (pe.idx % 3) * 10);
    var driftDuration = 4 + (pe.idx % 3);
    var delayVal = pe.idx * 0.15;
    gsap.to(pe.el, {
      y: driftY,
      duration: driftDuration,
      ease: 'none',
      repeat: 10,
      delay: delayVal
    });
  }

  /* ---- Logo breathing (looping, delayed) ---- */
  gsap.to('#statuzLogo', {
    scale: 1.06,
    duration: 2,
    ease: 'sine.inOut',
    yoyo: true,
    repeat: 10,
    delay: 3.5
  });

  /* ---- Register timeline ---- */
  window.__timelines = window.__timelines || {};
  window.__timelines["scene1"] = tl;
})();
</script>
