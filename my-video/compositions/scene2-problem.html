<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script>
(function() {
  var container = document.getElementById('root');
  var tl = gsap.timeline({ paused: true });

  /* ---- Create red dashed lines (deterministic positions) ---- */
  var lineData = [
    { x1: 560, y1: 60, x2: 280, y2: 190 },  // useState import → useState(0)
    { x1: 600, y1: 85, x2: 280, y2: 240 },  // apiClient import → apiClient.fetchData()
    { x1: 600, y1: 110, x2: 280, y2: 260 }, // authService import → authService.login()
    { x1: 640, y1: 135, x2: 280, y2: 310 }  // Button import → &lt;Button
  ];

  var svg = document.getElementById('redLinesSvg');
  var lineEls = [];
  for (var i = 0; i < lineData.length; i++) {
    var ld = lineData[i];
    var line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', ld.x1);
    line.setAttribute('y1', ld.y1);
    line.setAttribute('x2', ld.x2);
    line.setAttribute('y2', ld.y2);
    line.classList.add('red-line');
    svg.appendChild(line);
    lineEls.push(line);
  }

  /* ---- Set initial states ---- */
  // File tree starts off-screen left
  gsap.set('#fileTree', { x: -220 });
  // Code editor starts off-screen right
  gsap.set('#codeEditor', { x: 1700 });
  // Red lines start hidden (dashoffset large)
  gsap.set(lineEls, { strokeDashoffset: 1000 });
  // Headline hidden
  gsap.set('#headline', { autoAlpha: 0 });
  // Subheadline hidden
  gsap.set('#subheadline', { autoAlpha: 0 });
  // Logo hidden
  gsap.set('#statuzLogo', { autoAlpha: 0, scale: 1 });
  // Bottom rule hidden
  gsap.set('#bottomRule', { scaleX: 0, transformOrigin: 'center center' });
  // Oasis hidden
  gsap.set('#oasisCompany', { autoAlpha: 0 });

  /* ---- Timeline animations ---- */

  // File tree slides in from left (0.3s)
  tl.to('#fileTree', { x: 0, duration: 0.4, ease: 'power2.out' }, 0.3);

  // Code editor slides in from right (0.3s)
  tl.to('#codeEditor', { x: 0, duration: 0.4, ease: 'power2.out' }, 0.3);

  // Statuz logo fades in (0.5s)
  tl.to('#statuzLogo', { autoAlpha: 1, duration: 0.3, ease: 'power2.out' }, 0.5);

  // Bottom rule draws from center (0.8s)
  tl.fromTo('#bottomRule', { scaleX: 0 }, { scaleX: 1, duration: 0.5, ease: 'power2.out', transformOrigin: 'center center' }, 0.8);

  // Oasis Company fades in (1.0s)
  tl.to('#oasisCompany', { autoAlpha: 1, duration: 0.3, ease: 'power2.out' }, 1.0);

  // Red dashed lines draw sequentially (1.2s - 2.4s)
  tl.to(lineEls, {
    strokeDashoffset: 0,
    duration: 0.5,
    stagger: 0.3,
    ease: 'power2.out'
  }, 1.2);

  // Headline fades in (2.5s)
  tl.to('#headline', { autoAlpha: 1, duration: 0.5, ease: 'power2.out' }, 2.5);

  // Subheadline fades in (4.0s)
  tl.to('#subheadline', { autoAlpha: 1, duration: 0.5, ease: 'power2.out' }, 4.0);

  // Red lines pulse (4.5s)
  tl.to(lineEls, {
    opacity: 0.4,
    duration: 0.3,
    ease: 'sine.inOut',
    yoyo: true,
    repeat: 1
  }, 4.5);

  /* ---- Ambient glow breathing (looping, outside timeline) ---- */
  gsap.to('#ambientGlow', {
    opacity: 0.12,
    duration: 2,
    ease: 'sine.inOut',
    yoyo: true,
    repeat: 10
  });

  /* ---- Logo breathing (looping, delayed) ---- */
  gsap.to('#statuzLogo', {
    scale: 1.06,
    duration: 2,
    ease: 'sine.inOut',
    yoyo: true,
    repeat: 10,
    delay: 0.5
  });

  /* ---- Register timeline ---- */
  window.__timelines = window.__timelines || {};
  window.__timelines["scene2"] = tl;
})();
</script>
