  window.__timelines = window.__timelines || {};

  (function() {
    var tl = gsap.timeline({ paused: true });

    // ===== DETERMINISTIC PARTICLES (18) =====
    var particleData = [
      { x: 80, y: 150 }, { x: 200, y: 80 }, { x: 400, y: 200 },
      { x: 600, y: 100 }, { x: 800, y: 250 }, { x: 100, y: 350 },
      { x: 300, y: 300 }, { x: 500, y: 400 }, { x: 700, y: 320 },
      { x: 900, y: 180 }, { x: 150, y: 500 }, { x: 450, y: 550 },
      { x: 650, y: 480 }, { x: 850, y: 600 }, { x: 250, y: 650 },
      { x: 550, y: 700 }, { x: 750, y: 620 }, { x: 950, y: 500 }
    ];
    var pContainer = document.getElementById('s4-particles');
    var pEls = [];
    particleData.forEach(function(p, i) {
      var el = document.createElement('div');
      el.style.cssText = 'position:absolute;width:3px;height:3px;border-radius:50%;background:rgba(255,255,255,0.03);left:' + p.x + 'px;top:' + p.y + 'px;';

    });

    // ===== NODE REFS =====
    var nodeGroups = document.querySelectorAll('#s4-nodes .s4-node-group');
    var nodeCircles = document.querySelectorAll('#s4-nodes .s4-node-circle');
    var nodeGlows = document.querySelectorAll('#s4-nodes .s4-node-glow');

    // ===== EDGE REFS =====
    var edgeEls = document.querySelectorAll('#s4-edges .s4-edge');

    // ===== TERMINAL =====
    var termOutput = document.getElementById('s4-term-output');

    // ===== RINGS =====
    var ring1 = document.getElementById('s4-ring1');
    var ring2 = document.getElementById('s4-ring2');

    // ===== PATH DOT =====
    var pathDot = document.getElementById('s4-path-dot');

    // ===== QUERY LABEL =====
    var queryLabel = document.getElementById('s4-query-label');

    // ===== INITIAL SETUP =====
    gsap.set('#s4-ghost', { opacity: 0.025, xPercent: -50, yPercent: -50 });
    gsap.set('#s4-grid', { opacity: 0.3 });
    gsap.set('#s4-ambient-glow', { opacity: 1 });
    gsap.set('#s4-logo', { opacity: 0 });
    gsap.set('#s4-oasis', { opacity: 0 });
    gsap.set('#s4-rule', { scaleX: 0, opacity: 0 });
    gsap.set(ring1, { opacity: 0 });
    gsap.set(ring2, { opacity: 0 });
    gsap.set(pathDot, { opacity: 0, x: 0, y: 0 });
    gsap.set(edgeEls, { stroke: '#333333', strokeWidth: 1.5 });
    // Set edges to #007FD4 initially for a nice look, they'll be used for glow
    gsap.set('#s4-query-label', { opacity: 1 });

    // ===== PARTICLES FLOATING =====
    particleData.forEach(function(p, i) {
      var driftY = -(15 + (i % 4) * 8);
      var driftX = ((i % 5) - 2) * 6;
      tl.to(pEls[i], { y: driftY, x: driftX, opacity: 0.5, duration: 5 + (i % 3), ease: 'sine.inOut' }, 0);
      tl.to(pEls[i], { y: 0, x: 0, opacity: 0.03, duration: 5 + (i % 3), ease: 'sine.inOut' }, 5 + (i % 3));
    });

    // ===== GHOST TEXT DRIFT =====
    tl.to('#s4-ghost', { x: '-=20', duration: 15, ease: 'sine.inOut' }, 0);

    // ===== AMBIENT GLOW BREATHING =====
    tl.to('#s4-ambient-glow', { opacity: 0.8, duration: 3, ease: 'sine.inOut', yoyo: true, repeat: 2 }, 0);
    tl.to('#s4-ambient-glow', { opacity: 1, duration: 3, ease: 'sine.inOut', yoyo: true, repeat: 1 }, 9);

    // ===== GRID PULSE =====
    tl.to('#s4-grid', { opacity: 0.4, duration: 4, ease: 'sine.inOut', yoyo: true, repeat: 1 }, 0);

    // ===== EDGES DRAW =====
    edgeEls.forEach(function(edge, i) {
      tl.to(edge, { strokeDashoffset: 0, duration: 0.35, ease: 'power2.out' }, i * 0.08);
    });

    // ===== NODES PULSE WAVE =====
    nodeGroups.forEach(function(ng, i) {
      tl.to(ng, { scale: 1.1, duration: 0.3, ease: 'sine.inOut', yoyo: true, repeat: 1 }, 0.5 + i * 0.06);
    });

    // ===== HELPER: typeText with Math.floor() =====
    function typeText(el, text, startTime, charInterval) {
      el.textContent = '';
      for (var i = 0; i < text.length; i++) {
        (function(idx) {
          tl.call(function() {
            el.textContent = text.substring(0, Math.floor(idx) + 1);
          }, [], startTime + idx * charInterval);
        })(i);
      }
    }

    // ============================================================
    // PHASE 1: TRAVERSE (0-5s)
    // ============================================================
    // Query label set to "Traverse" at start
    tl.call(function() { queryLabel.textContent = 'Traverse'; }, [], 0);

    // Node 0 (api-gateway) scales 1.2x at 1.0s

    // Connected nodes (1,2,3) glow #007FD4 at 1.5s
    tl.to(nodeCircles[1], { backgroundColor: '#007FD4', duration: 0.3, ease: 'power2.out' }, 1.5);
    tl.to(nodeCircles[2], { backgroundColor: '#007FD4', duration: 0.3, ease: 'power2.out' }, 1.5);
