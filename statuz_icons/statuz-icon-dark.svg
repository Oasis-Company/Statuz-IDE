<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="none">
  <!-- Dark rounded background -->
  <rect width="256" height="256" rx="48" fill="#1E1E1E"/>
  <!-- Statuz logo: three line segments + current state marker, scaled to 256x256 -->
  <line x1="40" y1="184" x2="144" y2="168" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round"/>
  <line x1="144" y1="168" x2="112" y2="72" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round"/>
  <line x1="112" y1="72" x2="216" y2="56" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round"/>
  <!-- Current state marker -->
  <circle cx="128" cy="120" r="12" fill="#FFFFFF"/>
</svg>
